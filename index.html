<!DOCTYPE html>
<html>
    <head>
        <title>元宵燈謎</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <meta name="apple-mobile-web-app-title" content="ulusite" />
        <script>
            // set body padding in the beginning to avoid content shifting
            const userAgent = window.navigator.userAgent.toLowerCase();
            const small = /iPhone|Android/i;
            if (small.test(userAgent)) {
                document.querySelector('html').classList.add('small');
                const iphone = /iPhone/i;
                if (iphone.test(userAgent) && userAgent.includes('crios')) {
                    document.querySelector('html').classList.add('small-chrome');
                }
            } else {
                document.querySelector('html').classList.add('desktop');
            }
        </script>
        <style>
            :root {
                --page-max-width: 960px;
            }
            .desktop body {
                max-width: var(--page-max-width);
                padding: 0 10% 10%;
            }
            .small body {
                padding: 0 20px 20px;
            }
        </style>
        <link href="./css/style.css" rel="stylesheet"/>
        <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
        <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
        <link rel="shortcut icon" href="favicon/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />
    </head>
    <!--
    Prototypes:
    https://ulusite.pyscriptapps.com/riddles-zw/latest/ or
    https://ulusite.pyscriptapps.com/riddles-zw/latest/?id=2024feb
    where id can be 2024 (default), 2024feb, jieqi
    Add URL param "adm=1" to peek answers
    -->

    <!-- Riddle maim template -->
    <template id="template__riddle">
        <li class="riddle">
            <div class="question-wrapper">
                <a class="question link hide" target="_blank"></a>
                <span class="question strong no-link first-line"></span>
            </div>
            <div class="main-hint"><span class="hint hide"></span></div>
            <div class="more-hints hide">
                <div class="more-hint-text hide"></div>
                <input type="button" value="提 示" class="btn btn-aux btn-hint">
            </div>
            <div class="image-wrapper hide">
                <img class="img">
            </div>
            <div class="control"></div>
            <div class="buttons">
                <input type="button" value="跳 過" class="btn btn-pass">
                <input type="button" value="提 交" class="btn btn-submit">
                <div class="hide status"></div>
            </div>
            <div class="correct-answer-wrapper">
                <span class="">答案：</span>
                <span class="answer"></span>
                <span class="notes"></span>
            </div>
        </li>
    </template>

    <!-- Riddle choice label with image -->
    <template id="template__image-label">
        <label class="image-wrapper wrap">
            <img class="img">
        </label>
    </template>

    <!-- Riddle input：checkbox/radio -->
    <template id="template__choice">
      <div class="choice-container">
        <div class="choice-wrapper">
            <input class="choice-input">
            <label class="text-label">
                <span class="label-text"></span>
            </label>
        </div>
      </div>
    </template>

    <!-- Riddle input：text box -->
    <template id="template__textbox">
        <div class="text-wrapper">
            <input type="text" class="text-input">
        </div>
    </template>

    <body>
        <header>
            <div class="h1 riddle-title-wrapper strong">
                <span class="title">
                    <span class="red">元</span>
                    <span class="green">宵</span>
                    <span class="orange">燈</span>
                    <span class="blue">謎</span>
                </span>
                <span class="subtitle red"></span>
            </div>
            <div class="h1 common-title-wrapper hide green strong">
                <span class="title"></span>
                <span class="subtitle"></span>
            </div>
            <div class="score-rules">每題答對得二分，答錯得一分，跳過不得分</div>
            <div class="h3 score-headline">
                <span>題數:<span class="question-count"></span></span>
                <span>已答:<span class="answer-count"></span></span>
                <span>提示:<span class="hint-count"></span></span>
                <span>跳過:<span class="bypass-count"></span></span>
                <span>答對:<span class="correct-count"></span></span>
                <span>答錯:<span class="wrong-count"></span></span>
                <span>得分:<span class="score"></span></span>
                <span class="hide win">&#128512;</span>
                <span class="hide sad">&#128546;</span>
            </div>
        </header>
        <main>
            <ol class="riddle-list"></ol>
        </main>
        <footer>
            <!--
            pyscript.com doesn't allow us to upload files. Let's use data URI
            for sounds so we can host this prototype on pyscript.com

            <audio id="win" src="./assets/win.mp3"></audio>
            <audio id="sad" src="./assets/sad.mp3"></audio>
            -->
            Copyright (c) <span class="year"></span> ulusite
            <span class="date">3/21/26</span>
        </footer>
        <!--
        <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/cn2t.js"></script>
        -->
        <script src="./js/db.js"></script>
        <script src="./js/audios.js"></script>
        <script src="./js/app.js"></script>
    </body>
</html>
