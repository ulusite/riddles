<!DOCTYPE html>
<html>
    <head>
        <title>元宵燈謎</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <link href="./css/style.css" rel="stylesheet"/>
    </head>
    <!--
    Prototypes:
    https://ulusite.pyscriptapps.com/riddles-zw/latest/ or
    https://ulusite.pyscriptapps.com/riddles-zw/latest/?id=2024feb
    where id can be 2024 (default), 2024feb, jieqi
    Add URL param "adm=1" to peek answers
    -->

    <!-- Riddle maim template -->
    <template id="template__riddle">
      <li>
        <div class="riddle">
            <div class="question-wrapper strong">
                <!-- <span class="number"></span> -->
                <a class="question link hide" target="_blank"></a>
                <span class="question no-link first-line"></span>
            </div>
            <div class="main-hint"><span class="hint hide"></span></div>
            <div class="more-hints hide">
                <div class="more-hint-text hide"></div>
                <input type="button" value="提 示" class="btn btn-aux btn-hint">
            </div>
            <div class="image-wrapper hide">
                <img class="img">
            </div>
            <div class="control"></div>
            <div class="buttons">
                <input type="button" value="跳 過" class="btn btn-pass">
                <input type="button" value="提 交" class="btn btn-submit">
                <span class="hide error">請選擇答案再提交</span>
            </div>
            <div class="correct-answer-wrapper">
                <span class="">答案：</span>
                <span class="answer"></span>
                <span class="notes"></span>
            </div>
        </div>
      </li>
    </template>

    <!-- Riddle input： checkbox -->
    <template id="template__checkbox">
        <div class="checkbox-wrapper">
            <input type="checkbox" class="checkbox-input">
            <label>
                <span class="label-text"></span>
                <div class="image-wrapper hide">
                    <img class="img">
                </div>
            </label>
        </div>
    </template>

    <!-- Riddle input： radio button -->
    <template id="template__radio">
        <div class="radio-wrapper">
            <input type="radio" class="radio-input">
            <label>
                <span class="label-text"></span>
                <div class="image-wrapper hide">
                    <img class="img">
                </div>
            </label>
        </div>
    </template>

    <!-- Riddle input： text box -->
    <template id="template__text">
        <div class="text-wrapper">
            <input type="text" class="text-input">
        </div>
    </template>

    <body>
        <header>
            <div class="h1 riddle-title-wrapper strong">
                <span class="title">
                    <span class="red">元</span>
                    <span class="green">宵</span>
                    <span class="orange">燈</span>
                    <span class="blue">謎</span>
                </span>
                <span class="subtitle red"></span>
            </div>
            <div class="h1 common-title-wrapper hide green strong">
                <span class="title"></span>
                <span class="subtitle"></span>
            </div>
            <div>
                <span>每題跳過不得分，答對得一分，答錯倒扣一分。</span>
                <!-- <span class="smile">^.^</span> -->
            </div>
            <div class="h3 score-headline">
                <span>題數:<span class="question-count strong"></span></span>
                <span>已答:<span class="answer-count strong"></span></span>
                <span>提示:<span class="hint-count"></span></span>
                <span>跳過:<span class="bypass-count"></span></span>
                <span>答對:<span class="correct-count"></span></span>
                <span>答錯:<span class="wrong-count"></span></span>
                <span>得分:<span class="score strong"></span></span>
                <span class="hide win">&#128512;</span>
                <span class="hide sad">&#128546;</span>
            </div>

        </header>

        <main>
            <ol class="riddle-list"></ol>
        </main>
        <footer>
            <!--
            pyscript.com doesn't allow us to upload files. Let's use data URI
            for sounds so we can host this prototype on pyscript.com

            <audio id="win" src="./assets/win.mp3"></audio>
            <audio id="sad" src="./assets/sad.mp3"></audio>
            -->
            Copyright (c) <script>document.write(new Date().getFullYear())</script> ulusite
        </footer>
        <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/cn2t.js"></script>
        <script>

        // Initialize the converter for Simplified to Traditional
        // const converter = OpenCC.Converter({ from: 'cn', to: 't' });
        // const converted = converter('简体中文');
        // console.log('converted: ', converted);
        </script>
        <script src="./js/db.js"></script>
        <script src="./js/audios.js"></script>
        <script src="./js/app.js"></script>
    </body>
</html>
